name: Build and Release App

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag that starts with 'v' (e.g., v1.0, v2.1.3)

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller numpy pyaudio

    - name: Build with PyInstaller
      # IMPORTANT: Ensure 'main.py' is the exact name of your Python script in the repo!
      run: |
        pyinstaller --noconsole --onefile --name "win-audio-redirect" main.py

    - name: Zip the Binary
      run: |
        Compress-Archive -Path dist/win-audio-redirect.exe -DestinationPath win-audio-redirect.zip

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2 # Updated to v2!
      with:
        files: win-audio-redirect.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
